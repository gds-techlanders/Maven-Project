# .github/workflows/build-and-analyze.yml
name: Build & Analyze

# -------------------------------------------------
# 1️⃣  Triggers
# -------------------------------------------------
on:
  push:
    branches: [ main ]          # run on pushes to main
  pull_request:
    branches: [ main ]          # also run on PRs targeting main

# -------------------------------------------------
# 2️⃣  Permissions – required for the dependency‑submission action
# -------------------------------------------------
permissions:
  contents: read               # needed to checkout the repo
  security-events: write       # required by maven‑dependency‑submission-action
  # (optional) packages: write  # if you later push Docker images to GHCR

# -------------------------------------------------
# 3️⃣  Jobs
# -------------------------------------------------
jobs:
  build-analyze:
    runs-on: ubuntu‑latest

    # -------------------------------------------------
    # 4️⃣  Environment variables – make secrets available to steps
    # -------------------------------------------------
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
