name: cicd

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    # GitHub Environment where OPENAI_API_KEY secret is stored
    environment: production

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4.1.5

      - name: List files
        run: ls -l

      - name: Installing Java 11 on runner
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Java
        run: java -version

      - name: Build Maven Package
        id: maven_build
        run: |
          mvn package > build.log 2>&1
          echo "BUILD_STATUS=success" >> $GITHUB_ENV
        continue-on-error: true

      - name: Detect Maven Failure
        if: failure()
        run: echo "BUILD_STATUS=failure" >> $GITHUB_ENV

      - name: List Target Files
        run: |
          ls -l
          ls -l ./target || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t gagandeepgawri/cts:latest . >> build.log 2>&1
          docke push gagandeepgawri/cts:latest >> build.log 2>&1
        continue-on-error: true

      - name: Docker Container Creation Test
        run: |
          docker run -dt --name c1 gagandeepgawri/cts:latest >> build.log 2>&1
          docker ps >> build.log 2>&1
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Run AI Build Analysis
        if: always()
        env:
          # Pulled securely from GitHub Environment Secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUILD_STATUS: ${{ env.BUILD_STATUS }}
        run: python scripts/build_analysis.py

      - name: Upload AI Report
        uses: actions/upload-artifact@v4
        with:
          name: ai-build-report
          path: ai_build_report.txt
